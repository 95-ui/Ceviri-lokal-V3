name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # npm ci is deterministic and installs ALL deps (including dev deps
      # like @capacitor/cli) from package-lock.json.
      - name: Install Dependencies
      - run: npm install

      - name: Build Web App (Vite)
        run: npm run build

      # If android/ does not exist yet, add the platform.
      # If it already exists (because it was committed), just sync instead.
      - name: Add or Sync Android Platform
        run: |
          if [ -d "android" ]; then
            npx cap sync android
          else
            npx cap add android
            npx cap copy android
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --max-workers 2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ceviri-lokal-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
